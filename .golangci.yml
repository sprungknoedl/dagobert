version: "2"

linters:
  default: standard
  settings:
    errcheck:
      # Closing something that was only ever read from can't fail in a way
      # that matters here; excluded by type so this only ever covers
      # read-only closers, never writers (e.g. *os.File, which is used for
      # both, is deliberately not in this list).
      exclude-functions:
        - (io.Closer).Close
        - (io/fs.File).Close
        - (*archive/zip.ReadCloser).Close
        - (*database/sql.DB).Close
        # csv.Writer buffers internally; the stdlib-documented idiom is to
        # ignore per-Write errors and check the accumulated error once via
        # Error() after Flush().
        - (*encoding/csv.Writer).Write

# Report everything rather than capping output, so `make check` can't pass
# with issues silently hidden behind golangci-lint's default output limits.
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
